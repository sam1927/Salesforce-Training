{% extends "base.html" %}

{% block site_meta %}
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% if page and page.is_homepage %}<meta name="description" content="{{ config.site_description }}">{% endif %}
  {% if config.site_author %}<meta name="author" content="{{ config.site_author }}">{% endif %}
  {% if page and page.canonical_url %}<link rel="canonical" href="{{ page.canonical_url }}">{% endif %}
  <link rel="icon" href="{{ 'assets/images/FaveIcon/FaveIcon.png'|url }}" type="image/png">
{% endblock %}

{% block extrahead %}
  {{ super() }}
  <script>
    /* Early paint: apply saved theme + nav state before first render to prevent flash.
       Source of truth: localStorage "retroTheme" = "normal" | "warm" | "cool"
       Source of truth: sessionStorage "retroNavbarHidden" = "true" | "false"  */
    (function () {
      try {
        var THEME_BG = { warm: "#ffedbd", cool: "#caf9fc" };
        var theme = window.localStorage && window.localStorage.getItem("retroTheme");
        if (!theme) {
          try { window.localStorage.setItem("retroTheme", "normal"); } catch (e) {}
          theme = "normal";
        }
        var bg = THEME_BG[theme];
        if (bg) {
          document.documentElement.classList.add("retro-a11y-active");
          document.documentElement.setAttribute("data-retro-theme", theme);
          document.documentElement.style.setProperty("--retro-a11y-bg", bg);
        }
        if (window.sessionStorage && window.sessionStorage.getItem("retroNavbarHidden") === "true") {
          document.documentElement.classList.add("retro-navbar-hidden");
        }
      } catch (e) { /* storage unavailable */ }
    })();
  </script>
{% endblock %}
